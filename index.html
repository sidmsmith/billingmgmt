<!DOCTYPE html>
<html lang="en" class="theme-manhattan">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billing Management v0.1.1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="/shared.css?v=0.1.1" rel="stylesheet" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="header-body">
        <h1><i class="fa-solid fa-file-invoice-dollar"></i> Billing Management</h1>
        <div class="subtitle">v0.1.1</div>
      </div>
    </header>

    <div id="orgSection" class="auth-section">
      <label class="form-label" for="org">ORG:</label>
      <div class="auth-row">
        <input type="text" id="org" class="form-control" placeholder="Enter ORG" maxlength="20" />
        <button id="authBtn" class="btn btn-success px-4" type="button">Authenticate</button>
      </div>
      <small class="text-muted">Press Enter to authenticate</small>
    </div>

    <div class="app-status" id="status">Enter ORG and press Enter to authenticate</div>

    <div id="mainUI" style="display: none;">
      <div class="scope-bar">
        <div class="field">
          <label class="form-label" for="facilitySelect">Facility</label>
          <select id="facilitySelect" class="form-select form-select-sm"></select>
        </div>
        <div class="field">
          <label class="form-label" for="buSelect">Business Unit</label>
          <select id="buSelect" class="form-select form-select-sm"></select>
        </div>
        <div class="field">
          <label class="form-label" for="clientSelect">Client</label>
          <select id="clientSelect" class="form-select form-select-sm"></select>
        </div>
      </div>

      <div class="config-toolbar">
        <div class="toolbar-actions">
          <button type="button" class="btn btn-outline-secondary btn-sm" id="exportBtn" title="Download local draft as JSON">
            <i class="fa-solid fa-download"></i> Export
          </button>
          <label class="btn btn-outline-secondary btn-sm mb-0" id="importBtnLabel" title="Load config from JSON file">
            <i class="fa-solid fa-upload"></i> Import
            <input type="file" id="importFile" accept=".json,application/json" hidden />
          </label>
          <button type="button" class="btn btn-outline-warning btn-sm" id="resetBtn">
            <i class="fa-solid fa-eraser"></i> Reset to default
          </button>
          <button type="button" class="btn btn-success" id="saveBtn" disabled title="Save billing config to GitHub and redeploy">
            <i class="fa-solid fa-cloud-arrow-up"></i> Save &amp; Deploy
          </button>
        </div>
      </div>

      <ul class="nav nav-tabs billing-tabs" id="entityTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" data-entity="clientActivities" type="button">Client Activities</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" data-entity="rateCards" type="button">Rate Cards</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" data-entity="rulesTransaction" type="button">Transaction Rules</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" data-entity="rulesStorage" type="button">Storage Rules</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" data-entity="billToCodes" type="button">Bill-to Codes</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" data-entity="billingLogDefinitions" type="button">Billing Log Defs</button>
        </li>
      </ul>

      <div class="config-panel">
        <div class="config-panel-toolbar">
          <input type="search" id="searchInput" class="form-control form-control-sm" placeholder="Search records..." />
          <button type="button" class="btn btn-primary btn-sm" id="addRecordBtn">
            <i class="fa-solid fa-plus"></i> Add
          </button>
        </div>
        <div id="tableHost"></div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content billing-modal">
        <div class="modal-header">
          <h5 class="modal-title" id="editModalTitle">Edit record</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="editModalBody"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-success" id="editModalSave">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/config-admin.js?v=0.2.2"></script>
  <script src="/config-ui.js?v=0.2.2"></script>
  <script src="/rule-builder.js?v=0.2.2"></script>
  <script src="/app.js?v=0.2.2"></script>
</body>
</html>
